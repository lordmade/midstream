<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamVibe Splash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --electric-cyan: #00F5D4;
      --deep-indigo: #2B2D42;
      --vivid-magenta: #FF2A6D;
      --soft-white: #F5F7FA;
      --light-gray: #D9E1E8;
      --background: radial-gradient(circle at center, #2B2D42 0%, #1A1B2E 100%);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background: var(--background);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      transition: opacity 0.5s ease;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(0, 245, 212, 0.2), transparent 70%);
      animation: shimmer 3s ease-in-out infinite;
      z-index: 1;
    }

    body.fade-out {
      opacity: 0;
    }

    .splash-container {
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      margin: 0 auto;
    }

    .stream-logo {
      width: 140px;
      height: 140px;
      animation: wavePulse 2.5s ease-in-out infinite;
    }

    .loader {
      display: flex;
      gap: 12px;
    }

    .dot {
      width: 16px;
      height: 16px;
      background: linear-gradient(45deg, var(--electric-cyan), var(--vivid-magenta));
      border-radius: 50%;
      animation: orbit 1.5s ease-in-out infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.3s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.6s;
    }

    @keyframes orbit {
      0%, 100% {
        transform: translateY(0) scale(1);
        opacity: 0.8;
      }
      50% {
        transform: translateY(-12px) scale(1.2);
        opacity: 0.5;
      }
    }

    @keyframes wavePulse {
      0% {
        transform: scale(1);
        filter: drop-shadow(0 0 8px rgba(0, 245, 212, 0.5));
      }
      50% {
        transform: scale(1.15);
        filter: drop-shadow(0 0 20px rgba(0, 245, 212, 0.8));
      }
      100% {
        transform: scale(1);
        filter: drop-shadow(0 0 8px rgba(0, 245, 212, 0.5));
      }
    }

    @keyframes shimmer {
      0%, 100% {
        opacity: 0.3;
      }
      50% {
        opacity: 0.6;
      }
    }

    .splash-text {
      color: var(--soft-white);
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: 0.8px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 1.2s ease-out 0.6s forwards;
      opacity: 0;
    }

    .custom-alert {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--deep-indigo);
      padding: 1.75rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
      z-index: 1000;
      color: var(--soft-white);
      font-weight: 500;
      text-align: center;
      max-width: 90%;
      width: 360px;
      animation: fadeIn 0.4s ease-out forwards;
      border: 1px solid var(--light-gray);
    }

    .custom-alert.active {
      display: block;
    }

    .custom-alert .close-btn {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      color: var(--electric-cyan);
      cursor: pointer;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .custom-alert .close-btn:hover {
      transform: scale(1.2);
      color: var(--vivid-magenta);
    }

    .custom-alert .close-btn svg {
      width: 100%;
      height: 100%;
    }

    .custom-alert .retry-btn {
      margin-top: 1.25rem;
      padding: 0.6rem 1.75rem;
      background: var(--vivid-magenta);
      color: var(--soft-white);
      border: none;
      border-radius: 24px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .custom-alert .retry-btn:hover {
      background: #E0245E;
      transform: scale(1.05);
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(25px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @media (max-width: 640px) {
      .logo-container {
        gap: 1rem;
      }

      .stream-logo {
        width: 100px;
        height: 100px;
      }

      .loader {
        gap: 8px;
      }

      .dot {
        width: 12px;
        height: 12px;
      }

      .splash-text {
        font-size: 1.5rem;
      }

      .custom-alert {
        width: 90%;
        padding: 1.5rem;
      }

      .custom-alert .retry-btn {
        padding: 0.5rem 1.5rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo-container">
      <svg class="stream-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" stroke="url(#grad)" stroke-width="6" />
        <path d="M35 30 L70 50 L35 70 Z" fill="url(#grad)" />
        <g class="waves">
          <circle cx="50" cy="50" r="30" stroke="url(#grad)" stroke-width="3" opacity="0.6" />
          <circle cx="50" cy="50" r="35" stroke="url(#grad)" stroke-width="3" opacity="0.4" />
          <circle cx="50" cy="50" r="40" stroke="url(#grad)" stroke-width="3" opacity="0.2" />
        </g>
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00F5D4;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF2A6D;stop-opacity:1" />
          </linearGradient>
        </defs>
      </svg>
      <div class="loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <p class="splash-text">StreamVibe: Unleash Your Live</p>
  </div>

  <div id="custom-alert" class="custom-alert">
    <button class="close-btn" onclick="hideAlert()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <p id="alert-message">An error occurred. Please try again later.</p>
    <button class="retry-btn" onclick="retryAuth()">Retry</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
      authDomain: "fire-b-a8878.firebaseapp.com",
      databaseURL: "https://fire-b-a8878.firebaseio.com",
      projectId: "fire-b-a8878",
      storageBucket: "fire-b-a8878.firebasestorage.app",
      messagingSenderId: "658673187627",
      appId: "1:658673187627:web:6e4c29af661785f0afa36e",
      measurementId: "G-V4W97VMSKL"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const customAlert = document.getElementById("custom-alert");
    const alertMessage = document.getElementById("alert-message");

    function showAlert(message, autoHide = true) {
      alertMessage.textContent = message;
      customAlert.classList.add("active");
      if (autoHide) {
        setTimeout(hideAlert, 5000);
      }
    }

    function hideAlert() {
      customAlert.classList.remove("active");
    }

    async function checkAuthState(retries = 3, delay = 1000) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          await new Promise((resolve, reject) => {
            onAuthStateChanged(auth, async (user) => {
              try {
                if (user) {
                  const userRef = ref(db, `users/${user.uid}`);
                  const snapshot = await get(userRef);
                  const destination = snapshot.exists() ? "dashboard.html" : "signup.html";
                  document.body.classList.add("fade-out");
                  setTimeout(() => {
                    window.location.href = destination;
                  }, 1500);
                  resolve();
                } else {
                  document.body.classList.add("fade-out");
                  setTimeout(() => {
                    window.location.href = "signup.html";
                  }, 1500);
                  resolve();
                }
              } catch (error) {
                reject(error);
              }
            }, reject);
          });
          return;
        } catch (error) {
          console.error(`Auth attempt ${attempt} failed:`, error);
          if (attempt === retries) {
            let message = "Failed to connect to server. Please check your connection and try again.";
            if (error.code === "permission-denied") {
              message = "Permission denied. Please contact support.";
            } else if (error.code === "unavailable") {
              message = "Server is temporarily unavailable. Please try again later.";
            }
            showAlert(message, false);
          } else {
            await new Promise(resolve => setTimeout(resolve, delay));
          }
        }
      }
    }

    function retryAuth() {
      hideAlert();
      checkAuthState();
    }

    document.addEventListener("DOMContentLoaded", () => {
      checkAuthState();
    });
  </script>
</body>
</html>
