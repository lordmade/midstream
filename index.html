<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamVibe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap');

    :root {
      --brand-red: #E50914;
      --bg-dark: #141414;
      --bg-black: #000000;
      --text-main: #FFFFFF;
      --text-muted: #808080;
      --alert-bg: #181818;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-black);
      background-image: radial-gradient(circle at 50% 50%, #2b0205 0%, var(--bg-black) 75%);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      transition: opacity 0.8s ease-in-out;
      position: relative;
    }

    /* Cinematic subtle grid overlay */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(20, 20, 20, 0.85), rgba(20, 20, 20, 0.85)),
                        url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik0wIDAuNWg0ME0wIDEwLjVoNDBNMCAyMC41aDQwTTAgMzAuNWg0ME0wLjUgMHY0ME0xMC41IDB2NDBNMjAuNSAwdjQwTTMwLjUgMHY0MCIgc3Ryb2tlPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMDMpIi8+PC9zdmc+');
      z-index: 0;
      pointer-events: none;
    }

    body.fade-out {
      opacity: 0;
    }

    .splash-container {
      text-align: center;
      position: relative;
      z-index: 10;
      animation: cinematicZoom 2.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    .logo-text {
      font-family: 'Bebas Neue', cursive;
      color: var(--brand-red);
      font-size: 6rem;
      letter-spacing: 3px;
      margin: 0;
      text-shadow: 0 4px 20px rgba(229, 9, 20, 0.4);
      transform: scale(0.9);
      opacity: 0;
      animation: logoReveal 1.2s cubic-bezier(0.19, 1, 0.22, 1) 0.3s forwards;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--brand-red);
      border-radius: 50%;
      margin: 2rem auto 0;
      opacity: 0;
      /* Fades in after the logo, then spins infinitely */
      animation: fadeIn 0.5s ease-out 1s forwards, spin 1s linear infinite 1s;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes cinematicZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }

    @keyframes logoReveal {
      0% { opacity: 0; transform: scale(0.85) translateY(15px); filter: blur(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Netflix-Style Custom Alert */
    .custom-alert {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--alert-bg);
      padding: 2rem 2.5rem;
      border-radius: 4px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
      z-index: 1000;
      color: var(--text-main);
      text-align: center;
      width: 90%;
      max-width: 420px;
      animation: alertFade 0.3s ease-out forwards;
      border: 1px solid #333;
    }

    .custom-alert.active {
      display: block;
    }

    .custom-alert p {
      font-size: 1.1rem;
      font-weight: 400;
      margin-top: 0.5rem;
      margin-bottom: 1.75rem;
      color: #D2D2D2;
    }

    .custom-alert .close-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 24px;
      height: 24px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .custom-alert .close-btn:hover {
      color: var(--text-main);
    }

    .custom-alert .close-btn svg {
      width: 100%;
      height: 100%;
    }

    .custom-alert .retry-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--text-main);
      color: var(--bg-black);
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition: background-color 0.2s ease, opacity 0.2s ease;
    }

    .custom-alert .retry-btn:hover {
      background: #E5E5E5;
      opacity: 0.9;
    }

    @keyframes alertFade {
      0% { opacity: 0; transform: translate(-50%, -45%); }
      100% { opacity: 1; transform: translate(-50%, -50%); }
    }

    @media (max-width: 640px) {
      .logo-text {
        font-size: 3.5rem;
        letter-spacing: 1.5px;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border-width: 3px;
        margin-top: 1.5rem;
      }
      .custom-alert {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <h1 class="logo-text">STREAMVIBE</h1>
    
    <div class="spinner"></div>
  </div>

  <div id="custom-alert" class="custom-alert">
    <button class="close-btn" onclick="hideAlert()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <p id="alert-message">An error occurred. Please try again later.</p>
    <button class="retry-btn" onclick="retryAuth()">Retry Connection</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
      authDomain: "fire-b-a8878.firebaseapp.com",
      databaseURL: "https://fire-b-a8878.firebaseio.com",
      projectId: "fire-b-a8878",
      storageBucket: "fire-b-a8878.firebasestorage.app",
      messagingSenderId: "658673187627",
      appId: "1:658673187627:web:6e4c29af661785f0afa36e",
      measurementId: "G-V4W97VMSKL"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const customAlert = document.getElementById("custom-alert");
    const alertMessage = document.getElementById("alert-message");

    // Expose functions to global scope for HTML inline handlers
    window.hideAlert = function() {
      customAlert.classList.remove("active");
    }

    window.retryAuth = function() {
      hideAlert();
      checkAuthState();
    }

    function showAlert(message, autoHide = true) {
      alertMessage.textContent = message;
      customAlert.classList.add("active");
      if (autoHide) {
        setTimeout(hideAlert, 5000);
      }
    }

    async function checkAuthState(retries = 3, delay = 1000) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          await new Promise((resolve, reject) => {
            onAuthStateChanged(auth, async (user) => {
              try {
                if (user) {
                  const userRef = ref(db, `users/${user.uid}`);
                  const snapshot = await get(userRef);
                  const destination = snapshot.exists() ? "dashboard.html" : "signup.html";
                  
                  // Allow animation to play slightly longer for the cinematic feel before fading out
                  setTimeout(() => {
                    document.body.classList.add("fade-out");
                    setTimeout(() => { window.location.href = destination; }, 800);
                  }, 2000); 
                  resolve();
                } else {
                  setTimeout(() => {
                    document.body.classList.add("fade-out");
                    setTimeout(() => { window.location.href = "signup.html"; }, 800);
                  }, 2000);
                  resolve();
                }
              } catch (error) {
                reject(error);
              }
            }, reject);
          });
          return;
        } catch (error) {
          console.error(`Auth attempt ${attempt} failed:`, error);
          if (attempt === retries) {
            let message = "Failed to connect to server. Please check your connection and try again.";
            if (error.code === "permission-denied") {
              message = "Permission denied. Please contact support.";
            } else if (error.code === "unavailable") {
              message = "Server is temporarily unavailable. Please try again later.";
            }
            showAlert(message, false);
          } else {
            await new Promise(resolve => setTimeout(resolve, delay));
          }
        }
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      checkAuthState();
    });
  </script>
</body>
</html>
