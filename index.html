<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamVibe | Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E50914;
      --red-deep: #9b050f;
      --red-glow: rgba(229, 9, 20, 0.35);
      --bg: #080808;
      --surface: rgba(10, 10, 10, 0.82);
      --border: rgba(255,255,255,0.07);
      --input-bg: rgba(255,255,255,0.06);
      --input-focus: rgba(255,255,255,0.11);
      --text: #f0f0f0;
      --muted: #6b6b6b;
      --subtle: #3a3a3a;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Cinematic Background ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .bg-poster {
      position: absolute;
      inset: 0;
      background:
        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600&q=80') center/cover no-repeat;
      filter: brightness(0.18) saturate(0.4);
    }

    .bg-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, transparent 0%, var(--bg) 75%),
        linear-gradient(to bottom, transparent 40%, var(--bg) 100%),
        linear-gradient(to top, transparent 60%, rgba(8,8,8,0.9) 100%);
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 50% at 50% 50%, black 0%, transparent 80%);
    }

    .bg-glow {
      position: absolute;
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, var(--red-glow) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -70%);
      filter: blur(40px);
      animation: pulseGlow 4s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      from { opacity: 0.4; transform: translate(-50%, -70%) scale(1); }
      to   { opacity: 0.7; transform: translate(-50%, -70%) scale(1.1); }
    }

    /* ── Main Layout ── */
    .page-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 2rem 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Logo ── */
    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(3.5rem, 10vw, 5.5rem);
      color: var(--red);
      letter-spacing: 3px;
      line-height: 1;
      text-shadow: 0 0 40px var(--red-glow), 0 2px 0 var(--red-deep);
      opacity: 0;
      transform: translateY(-12px) scale(0.95);
      animation: logoIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                  font-size 0.6s ease,
                  margin-bottom 0.6s ease;
      cursor: default;
      user-select: none;
    }

    .logo.compact {
      font-size: clamp(2rem, 6vw, 2.8rem);
      margin-bottom: 1.5rem;
      letter-spacing: 4px;
    }

    @keyframes logoIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Loader ── */
    .loader {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.9s forwards;
    }

    .loader-ring {
      width: 44px;
      height: 44px;
      border: 2.5px solid rgba(255,255,255,0.08);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    .loader-text {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 400;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Auth Card ── */
    .auth-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: clamp(1.75rem, 6vw, 2.75rem) clamp(1.5rem, 7vw, 2.75rem);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 24px 64px rgba(0,0,0,0.7),
        0 0 40px rgba(229,9,20,0.08);
      opacity: 0;
      display: none;
      transform: translateY(16px);
      animation: none;
    }

    .auth-card.visible {
      display: block;
      animation: cardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-card h2 {
      font-size: clamp(1.5rem, 5vw, 1.85rem);
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }

    .auth-card .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
      font-weight: 300;
    }

    /* ── Inputs ── */
    .field {
      position: relative;
      margin-bottom: 0.85rem;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .field:focus-within label {
      color: rgba(255,255,255,0.6);
    }

    .field input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    .field input::placeholder { color: var(--subtle); }

    .field input:focus {
      outline: none;
      background: var(--input-focus);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 3px rgba(229,9,20,0.12);
    }

    .field input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
    }

    /* Password toggle */
    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute;
      right: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      padding: 4px;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--text); }

    /* ── Submit Button ── */
    .btn-submit {
      width: 100%;
      padding: 0.9rem 1rem;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.25rem;
      letter-spacing: 0.02em;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }

    .btn-submit:hover:not(:disabled) {
      background: #f10c18;
      box-shadow: 0 4px 20px rgba(229,9,20,0.4);
      transform: translateY(-1px);
    }

    .btn-submit:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-submit .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-submit.loading .btn-spinner { display: block; }
    .btn-submit.loading .btn-label { opacity: 0.7; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--subtle);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Toggle ── */
    .auth-toggle {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .auth-toggle button {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 0;
      margin-left: 0.25rem;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .auth-toggle button:hover { color: var(--red); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      top: 1.25rem;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #1a0608;
      border: 1px solid rgba(229,9,20,0.4);
      color: #ffd0d0;
      padding: 0.85rem 1.25rem;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: calc(100% - 2.5rem);
      max-width: 400px;
      font-size: 0.875rem;
      font-weight: 400;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
      opacity: 0;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .toast-icon { flex-shrink: 0; color: var(--red); }
    .toast-msg { flex: 1; }
    .toast-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .toast-close:hover { color: var(--text); }

    /* ── Footer ── */
    .page-footer {
      position: relative;
      z-index: 10;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 2rem 1.5rem 1.5rem;
      line-height: 2;
      opacity: 0;
      animation: fadeIn 0.6s ease 2.5s forwards;
    }
    .page-footer a { color: var(--subtle); text-decoration: none; }
    .page-footer a:hover { color: var(--muted); text-decoration: underline; }

    @keyframes fadeIn { to { opacity: 1; } }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .page-wrap { padding: 1.5rem 1rem; }
      .auth-card { border-radius: 10px; }
      .page-footer { font-size: 0.7rem; padding: 1.5rem 1rem 1rem; }
    }

    @media (min-height: 800px) {
      .page-wrap { padding-top: 3rem; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-layer">
    <div class="bg-poster"></div>
    <div class="bg-vignette"></div>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
  </div>

  <!-- Main -->
  <main class="page-wrap" role="main">
    <h1 id="logo" class="logo" aria-label="StreamVibe">STREAMVIBE</h1>

    <!-- Loading state -->
    <div id="loader" class="loader" aria-live="polite" aria-label="Checking your session">
      <div class="loader-ring"></div>
      <span class="loader-text">Checking session…</span>
    </div>

    <!-- Auth Card -->
    <div id="auth-card" class="auth-card" role="region" aria-label="Authentication">
      <h2 id="auth-title">Sign In</h2>
      <p class="subtitle" id="auth-sub">Welcome back. Pick up where you left off.</p>

      <form id="auth-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Toggle password visibility">
              <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" id="submit-btn" class="btn-submit">
          <span class="btn-inner">
            <span class="btn-spinner"></span>
            <span class="btn-label" id="btn-label">Sign In</span>
          </span>
        </button>
      </form>

      <div class="auth-toggle">
        <span id="toggle-text">New to StreamVibe?</span>
        <button id="toggle-btn" type="button">Sign up now</button>
      </div>
    </div>
  </main>

  <footer class="page-footer">
    <div>
      <a href="#">Privacy</a> &nbsp;·&nbsp;
      <a href="#">Terms</a> &nbsp;·&nbsp;
      <a href="#">Help Centre</a>
    </div>
    <div style="margin-top:0.25rem;">© 2025 StreamVibe. All rights reserved.</div>
  </footer>

  <!-- Toast -->
  <div id="toast" class="toast" role="alert" aria-live="assertive">
    <span class="toast-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </span>
    <span class="toast-msg" id="toast-msg"></span>
    <button class="toast-close" onclick="hideToast()" aria-label="Dismiss">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, set, get }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
      authDomain: "fire-b-a8878.firebaseapp.com",
      databaseURL: "https://fire-b-a8878.firebaseio.com",
      projectId: "fire-b-a8878",
      storageBucket: "fire-b-a8878.firebasestorage.app",
      messagingSenderId: "658673187627",
      appId: "1:658673187627:web:6e4c29af661785f0afa36e",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);

    // DOM
    const logo      = document.getElementById('logo');
    const loader    = document.getElementById('loader');
    const card      = document.getElementById('auth-card');
    const form      = document.getElementById('auth-form');
    const titleEl   = document.getElementById('auth-title');
    const subEl     = document.getElementById('auth-sub');
    const submitBtn = document.getElementById('submit-btn');
    const btnLabel  = document.getElementById('btn-label');
    const toggleBtn = document.getElementById('toggle-btn');
    const toggleTxt = document.getElementById('toggle-text');
    const emailIn   = document.getElementById('email');
    const passIn    = document.getElementById('password');
    const pwToggle  = document.getElementById('pw-toggle');
    const eyeOpen   = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');

    let isLogin = true;
    let authChecked = false;

    // Toast
    let toastTimer;
    window.hideToast = () => document.getElementById('toast').classList.remove('show');
    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(window.hideToast, 5000);
    }

    // Password visibility toggle
    pwToggle.addEventListener('click', () => {
      const isPw = passIn.type === 'password';
      passIn.type = isPw ? 'text' : 'password';
      eyeOpen.style.display  = isPw ? 'none' : 'block';
      eyeClosed.style.display = isPw ? 'block' : 'none';
      passIn.focus();
    });

    // Show auth UI
    function revealAuth() {
      loader.style.opacity = '0';
      loader.style.pointerEvents = 'none';
      setTimeout(() => {
        loader.style.display = 'none';
        logo.classList.add('compact');
        card.classList.add('visible');
      }, 350);
    }

    // Toggle sign in / sign up
    toggleBtn.addEventListener('click', () => {
      isLogin = !isLogin;
      titleEl.textContent = isLogin ? 'Sign In' : 'Create Account';
      subEl.textContent   = isLogin ? 'Welcome back. Pick up where you left off.' : 'Join StreamVibe. Watch everything.';
      btnLabel.textContent = isLogin ? 'Sign In' : 'Create Account';
      toggleTxt.textContent = isLogin ? 'New to StreamVibe?' : 'Already have an account?';
      toggleBtn.textContent = isLogin ? 'Sign up now' : 'Sign in';
      emailIn.value = passIn.value = '';
      emailIn.classList.remove('error');
      passIn.classList.remove('error');
      window.hideToast();
      emailIn.focus();
    });

    // Error codes → friendly messages
    const errMap = {
      'auth/invalid-credential': 'Incorrect email or password.',
      'auth/wrong-password': 'Incorrect email or password.',
      'auth/user-not-found': 'No account found with that email.',
      'auth/email-already-in-use': 'An account with this email already exists.',
      'auth/weak-password': 'Password must be at least 6 characters.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/too-many-requests': 'Too many attempts. Please try again later.',
      'auth/network-request-failed': 'Network error. Check your connection.',
    };

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.classList.toggle('loading', loading);
      if (loading) {
        btnLabel.textContent = 'Processing…';
      } else {
        btnLabel.textContent = isLogin ? 'Sign In' : 'Create Account';
      }
    }

    // Form submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = emailIn.value.trim();
      const password = passIn.value.trim();

      // Basic validation
      let hasErr = false;
      if (!email)    { emailIn.classList.add('error'); hasErr = true; }
      else             emailIn.classList.remove('error');
      if (!password) { passIn.classList.add('error');  hasErr = true; }
      else             passIn.classList.remove('error');
      if (hasErr) { showToast('Please fill in all fields.'); return; }

      setLoading(true);

      try {
        if (isLogin) {
          await signInWithEmailAndPassword(auth, email, password);
        } else {
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          await set(ref(db, 'users/' + cred.user.uid), {
            email: cred.user.email,
            createdAt: new Date().toISOString()
          });
        }
        // onAuthStateChanged handles redirect
      } catch (err) {
        setLoading(false);
        showToast(errMap[err.code] || 'Something went wrong. Please try again.');
        console.error(err);
      }
    });

    // Clear error state on input
    [emailIn, passIn].forEach(el => {
      el.addEventListener('input', () => el.classList.remove('error'));
    });

    // Auth state
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          await get(ref(db, `users/${user.uid}`));
          document.body.style.transition = 'opacity 0.5s ease';
          document.body.style.opacity = '0';
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
        } catch {
          if (!authChecked) { authChecked = true; setTimeout(revealAuth, 1200); }
        }
      } else {
        if (!authChecked) {
          authChecked = true;
          setTimeout(revealAuth, 1200);
        }
      }
    });
  </script>
</body>
</html>
